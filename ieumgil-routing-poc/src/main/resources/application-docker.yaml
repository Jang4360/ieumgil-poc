spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:ieumgil}
    username: ${DB_USERNAME:ieumgil}
    password: ${DB_PASSWORD:ieumgil}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

ieumgil:
  graphhopper:
    base-url: ${GRAPHHOPPER_BASE_URL:http://graphhopper:8989}
