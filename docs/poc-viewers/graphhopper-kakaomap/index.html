<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GraphHopper Hybrid Transit Viewer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel">
        <h1>Hybrid Transit Viewer</h1>
        <p class="panel-copy">
          출발지와 도착지를 입력하면, 1km 이하는 보행 경로를, 1km 초과는 도보 + 버스 + 지하철 혼합 경로를
          조회하는 PoC viewer입니다.
        </p>

        <section class="section">
          <h2>환경</h2>
          <div id="config-status" class="status-box status-warn">
            <strong>대기 중</strong>
            <span>GraphHopper와 로컬 hybrid API 연결 상태를 확인합니다.</span>
          </div>
        </section>

        <section class="section">
          <h2>입력</h2>

          <label class="field">
            <span>Preset</span>
            <select id="preset-select"></select>
          </label>
          <button id="apply-preset-button" type="button">Preset 좌표 채우기</button>

          <div class="coordinate-card">
            <div class="coordinate-header">
              <strong>출발지</strong>
              <button id="pick-start-button" class="secondary-button" type="button">지도에서 출발지 선택</button>
            </div>
            <div class="coordinate-grid">
              <label class="field">
                <span>위도</span>
                <input id="start-lat-input" type="number" step="0.0000001">
              </label>
              <label class="field">
                <span>경도</span>
                <input id="start-lng-input" type="number" step="0.0000001">
              </label>
            </div>
          </div>

          <div class="coordinate-card">
            <div class="coordinate-header">
              <strong>도착지</strong>
              <button id="pick-end-button" class="secondary-button" type="button">지도에서 도착지 선택</button>
            </div>
            <div class="coordinate-grid">
              <label class="field">
                <span>위도</span>
                <input id="end-lat-input" type="number" step="0.0000001">
              </label>
              <label class="field">
                <span>경도</span>
                <input id="end-lng-input" type="number" step="0.0000001">
              </label>
            </div>
          </div>

          <div id="selection-hint" class="selection-hint">
            지도 클릭 선택 모드가 꺼져 있습니다.
          </div>

          <label class="field">
            <span>도보 프로필</span>
            <select id="profile-select">
              <option value="visual_shortest">visual_shortest</option>
              <option value="visual_safe">visual_safe</option>
              <option value="wheelchair_shortest">wheelchair_shortest</option>
              <option value="wheelchair_safe">wheelchair_safe</option>
            </select>
          </label>

          <div class="button-row">
            <button id="load-route-button" type="button">하이브리드 경로 조회</button>
            <button id="compare-family-button" type="button">보행 family shortest/safe 비교</button>
          </div>
        </section>

        <section class="section">
          <h2>경로 요약</h2>
          <div id="route-summary" class="info-card empty-state">
            아직 조회된 경로가 없습니다.
          </div>
        </section>

        <section class="section">
          <h2>구간 상세</h2>
          <div id="details-summary" class="info-card empty-state">
            조회 후 도보/버스/지하철 구간 상세가 여기에 표시됩니다.
          </div>
        </section>
      </aside>

      <main class="map-area">
        <div id="map"></div>
      </main>
    </div>

    <script src="./config.local.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
